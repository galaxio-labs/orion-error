<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>orion-error documentation</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: Canvas;
        color: CanvasText;
      }
      main {
        width: min(720px, calc(100% - 40px));
      }
      h1 {
        font-size: clamp(2rem, 6vw, 4rem);
        margin: 0 0 12px;
      }
      p {
        color: color-mix(in srgb, CanvasText 72%, Canvas);
        margin: 0 0 28px;
      }
      nav {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }
      a {
        border: 1px solid color-mix(in srgb, CanvasText 18%, Canvas);
        border-radius: 8px;
        color: inherit;
        display: block;
        padding: 18px 20px;
        text-decoration: none;
      }
      a:hover {
        border-color: color-mix(in srgb, CanvasText 42%, Canvas);
      }
      strong {
        display: block;
        font-size: 1.1rem;
        margin-bottom: 4px;
      }
      span {
        color: color-mix(in srgb, CanvasText 68%, Canvas);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>orion-error</h1>
      <p>Structured error governance for Rust.</p>
      <nav aria-label="Documentation language">
        <a href="./en/">
          <strong>English</strong>
          <span>Read the English documentation</span>
        </a>
        <a href="./zh/">
          <strong>简体中文</strong>
          <span>阅读中文文档</span>
        </a>
      </nav>
    </main>
  </body>
</html>
