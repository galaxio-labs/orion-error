<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">orion-error structured flow</title>
  <desc id="desc">A flow diagram showing raw errors entering via source_err, layer conversion via conv_err, and boundary outputs via report, snapshot, and exposure_snapshot.</desc>
  <rect width="1200" height="520" rx="28" fill="#F9F6F0"/>
  <rect x="36" y="36" width="1128" height="448" rx="20" fill="#FFFDF8" stroke="#D7CFC2"/>

  <rect x="72" y="88" width="240" height="88" rx="18" fill="#10263D"/>
  <text x="192" y="120" text-anchor="middle" fill="#E5EEF8" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="700">raw std error</text>
  <text x="192" y="146" text-anchor="middle" fill="#C8D5E3" font-family="Inter, ui-sans-serif, system-ui" font-size="14">or lower StructError</text>

  <rect x="480" y="84" width="240" height="96" rx="18" fill="#0F766E"/>
  <text x="600" y="120" text-anchor="middle" fill="#F2FFFD" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="700">source_err(...)</text>
  <text x="600" y="146" text-anchor="middle" fill="#D1F0EC" font-family="Inter, ui-sans-serif, system-ui" font-size="14">first entry or new boundary</text>

  <rect x="888" y="88" width="240" height="88" rx="18" fill="#B45309"/>
  <text x="1008" y="120" text-anchor="middle" fill="#FFF6E9" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="700">StructError<R></text>
  <text x="1008" y="146" text-anchor="middle" fill="#F9E1C6" font-family="Inter, ui-sans-serif, system-ui" font-size="14">detail + source chain</text>

  <path d="M312 132H464" stroke="#5A6672" stroke-width="4" stroke-linecap="round"/>
  <path d="M452 122L472 132L452 142" fill="none" stroke="#5A6672" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M720 132H872" stroke="#5A6672" stroke-width="4" stroke-linecap="round"/>
  <path d="M860 122L880 132L860 142" fill="none" stroke="#5A6672" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="480" y="240" width="240" height="86" rx="18" fill="#D97706"/>
  <text x="600" y="273" text-anchor="middle" fill="#FFF7ED" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="700">conv_err()</text>
  <text x="600" y="298" text-anchor="middle" fill="#FDE7CB" font-family="Inter, ui-sans-serif, system-ui" font-size="14">reason-only remap</text>

  <path d="M600 180V228" stroke="#5A6672" stroke-width="4" stroke-linecap="round"/>
  <path d="M590 216L600 236L610 216" fill="none" stroke="#5A6672" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="72" y="358" width="240" height="76" rx="18" fill="#10263D"/>
  <text x="192" y="390" text-anchor="middle" fill="#E5EEF8" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="700">report()</text>
  <text x="192" y="414" text-anchor="middle" fill="#C8D5E3" font-family="Inter, ui-sans-serif, system-ui" font-size="13">human diagnostics</text>

  <rect x="480" y="358" width="240" height="76" rx="18" fill="#0F766E"/>
  <text x="600" y="390" text-anchor="middle" fill="#F2FFFD" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="700">snapshot()</text>
  <text x="600" y="414" text-anchor="middle" fill="#D1F0EC" font-family="Inter, ui-sans-serif, system-ui" font-size="13">stable machine export</text>

  <rect x="888" y="358" width="240" height="76" rx="18" fill="#B45309"/>
  <text x="1008" y="390" text-anchor="middle" fill="#FFF7ED" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="700">exposure_snapshot()</text>
  <text x="1008" y="414" text-anchor="middle" fill="#FDE7CB" font-family="Inter, ui-sans-serif, system-ui" font-size="13">HTTP / RPC / CLI / log</text>

  <path d="M192 336V352" stroke="#5A6672" stroke-width="4" stroke-linecap="round"/>
  <path d="M600 336V352" stroke="#5A6672" stroke-width="4" stroke-linecap="round"/>
  <path d="M1008 336V352" stroke="#5A6672" stroke-width="4" stroke-linecap="round"/>

  <text x="600" y="472" text-anchor="middle" fill="#556172" font-family="Inter, ui-sans-serif, system-ui" font-size="14">
    Structure stays visible from entry, through layer mapping, to protocol output.
  </text>
</svg>
